version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noble-classes-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/prisma/dev.db:/app/prisma/dev.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noble-classes-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
